<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arturo Calle | Contáctanos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ARTURO CALLE</a>
        <nav>
            <ul>
                <li><a href="index.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: sub; margin-right: 5px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Inicio
                </a></li>
                <li><a href="servicios.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: sub; margin-right: 5px;"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg> Servicios
                </a></li>
                <li><a href="contacto.html" class="active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: sub; margin-right: 5px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> Contacto
                </a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="form-section">
            <div class="contact-header">
                <h1>Contáctanos</h1>
            </div>
            <div class="form-container">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="cedula">Cédula</label>
                        <input type="number" id="cedula" name="cedula" required min="0" placeholder="Número de identificación">
                    </div>
                    <div class="form-group">
                        <label for="nombres">Nombres</label>
                        <input type="text" id="nombres" name="nombres" required placeholder="Tus nombres">
                    </div>
                    <div class="form-group">
                        <label for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" required placeholder="Tus apellidos">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" name="usuario" required placeholder="Nombre de usuario">
                    </div>
                    <div class="form-group">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" required placeholder="••••••••">
                    </div>
                    <button type="submit">Enviar Mensaje</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/arturocalleoficial/" target="_blank" rel="noopener">Facebook</a>
            <a href="https://www.instagram.com/arturocalleoficial/" target="_blank" rel="noopener">Instagram</a>
            <a href="https://x.com/Arturo_Calle" target="_blank" rel="noopener">Twitter</a>
        </div>
        <p>&copy; 2026 Arturo Calle. Todos los derechos reservados.</p>
    </footer>
    <script>
        let lastScroll = 0;
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll <= 0) {
                header.classList.remove('header-hidden');
                return;
            }
            if (currentScroll > lastScroll && currentScroll > 150) {
                header.classList.add('header-hidden');
            } else {
                header.classList.remove('header-hidden');
            }
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
